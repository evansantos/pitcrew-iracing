name: Build iRacing Relay Executable

on:
  push:
    branches: [main]
    paths:
      - 'tools/windows-relay-server-socketio.py'
      - 'tools/build-relay.bat'
      - '.github/workflows/build-relay.yml'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyirsdk python-socketio websocket-client pyinstaller

      - name: Build executable
        run: |
          cd tools
          echo "Default values (hardcoded in executable):"
          echo "  - Host: pitcrew-iracing.onrender.com"
          echo "  - Port: 443"
          echo "  - Secure: Yes (HTTPS/WSS)"
          echo "  - Rate: 16 Hz"
          echo ""
          pyinstaller --onefile `
            --name "iRacing-Relay-v3.1" `
            --console `
            --clean `
            --noconfirm `
            windows-relay-server-socketio.py

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: iRacing-Relay-Windows
          path: tools/dist/iRacing-Relay-v3.1.exe
          retention-days: 90

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: tools/dist/iRacing-Relay-v3.1.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

services:
  postgres:
    image: postgres:16-alpine
    container_name: iracing-postgres
    environment:
      POSTGRES_DB: race_engineer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: iracing-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: iracing-ollama
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:8b}
    # Uncomment the following lines if you have an NVIDIA GPU for acceleration
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ['CMD-SHELL', 'ollama list || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  ollama-setup:
    image: ollama/ollama:latest
    container_name: iracing-ollama-setup
    volumes:
      - ./docker/ollama:/scripts
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:8b}
    entrypoint: ['/scripts/pull-model.sh']
    depends_on:
      ollama:
        condition: service_healthy
    restart: 'no'

  api:
    build:
      context: .
      dockerfile: ./docker/api/Dockerfile
    container_name: iracing-api
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/race_engineer
      REDIS_URL: redis://redis:6379
      OLLAMA_BASE_URL: http://ollama:11434
      API_PORT: 3000
      SOCKET_PORT: 3001
      # iRacing Mode Configuration
      IRACING_MODE: ${IRACING_MODE:-mock}
      IRACING_RELAY_HOST: ${IRACING_RELAY_HOST:-host.docker.internal}
      IRACING_RELAY_PORT: ${IRACING_RELAY_PORT:-3002}
    ports:
      - '3000:3000'
      - '3001:3001'
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: ./docker/web/Dockerfile
    container_name: iracing-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NEXT_PUBLIC_WS_URL: ws://localhost:3001
    ports:
      - '3002:3000'
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/web/.next
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ollama_data:
    driver: local

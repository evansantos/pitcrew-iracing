# Render.com deployment configuration
# This file defines all services for automatic deployment
# Learn more: https://render.com/docs/infrastructure-as-code

services:
  # API Server
  - type: web
    name: iracing-api
    runtime: node
    plan: free  # Change to 'starter' for production
    buildCommand: npm install -g pnpm && pnpm install && pnpm run build --filter=@iracing-race-engineer/api
    startCommand: pnpm run start --filter=@iracing-race-engineer/api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: 3000
      - key: SOCKET_PORT
        value: 3001
      - key: CORS_ORIGIN
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: iracing-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: iracing-redis
          property: connectionString
      # Add your Ollama URL if using AI features
      # - key: OLLAMA_BASE_URL
      #   value: http://your-ollama-instance:11434

  # Webapp
  - type: web
    name: iracing-webapp
    runtime: node
    plan: free  # Change to 'starter' for production
    buildCommand: npm install -g pnpm && pnpm install && pnpm run build --filter=@iracing-race-engineer/web
    startCommand: pnpm run start --filter=@iracing-race-engineer/web
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://iracing-api.onrender.com
      - key: NEXT_PUBLIC_WS_URL
        value: wss://iracing-api.onrender.com:3001

databases:
  # PostgreSQL Database
  - name: iracing-db
    databaseName: iracing_race_engineer
    plan: free  # Change to 'starter' for production
    ipAllowList: []  # Allow all IPs

  # Redis Cache
  - name: iracing-redis
    plan: free  # Change to 'starter' for production
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []  # Allow all IPs

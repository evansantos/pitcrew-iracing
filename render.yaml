# Render.com Monolith Deployment Configuration
# This deploys both API and Webapp as a SINGLE service
# Cheaper and simpler than separate services!

services:
  # Combined API + Webapp Service
  - type: web
    name: pitcrew-iracing
    runtime: node
    plan: free  # Change to 'starter' for production ($7/month - no sleeping)

    # Build both projects
    buildCommand: |
      npm install -g pnpm &&
      pnpm install --no-frozen-lockfile --prod=false &&
      pnpm run build --filter=@iracing-race-engineer/api &&
      pnpm run build --filter=@iracing-race-engineer/web

    # Start only the API (it will serve the webapp files)
    startCommand: cd apps/api && node dist/index.js

    healthCheckPath: /health

    # Environment Variables
    envVars:
      # Node environment
      - key: NODE_ENV
        value: production

      # API Configuration
      - key: API_PORT
        value: 3000
      - key: SOCKET_PORT
        value: 3001
      - key: CORS_ORIGIN
        value: "*"

      # Database (auto-created if using Blueprint)
      - key: DATABASE_URL
        fromDatabase:
          name: pitcrew-db
          property: connectionString

      # Redis (auto-created if using Blueprint)
      - key: REDIS_URL
        fromService:
          type: redis
          name: pitcrew-redis
          property: connectionString

      # Next.js Configuration (for webapp)
      - key: NEXT_PUBLIC_API_URL
        value: https://pitcrew-iracing.onrender.com
      - key: NEXT_PUBLIC_WS_URL
        value: wss://pitcrew-iracing.onrender.com:3001

      # Optional: Ollama AI service
      # - key: OLLAMA_BASE_URL
      #   value: http://your-ollama-instance:11434

  # Redis Cache Service
  - type: redis
    name: pitcrew-redis
    plan: free  # Change to 'starter' for production
    ipAllowList: []  # Allow all IPs

databases:
  # PostgreSQL Database
  - name: pitcrew-db
    databaseName: pitcrew_iracing
    plan: free  # Change to 'starter' for production
    ipAllowList: []  # Allow all IPs

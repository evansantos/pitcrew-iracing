# Render.com API Backend Deployment
# Deploys only the backend API server

services:
  # API Backend Service
  - type: web
    name: pitcrew-iracing-api
    runtime: node
    plan: starter  # $7/month - no sleeping, faster performance

    # Build only shared package and API
    buildCommand: |
      npm install -g pnpm &&
      pnpm install --no-frozen-lockfile --prod=false &&
      pnpm run build --filter=@iracing-race-engineer/shared &&
      pnpm run build --filter=@iracing-race-engineer/api &&
      echo "=== Verifying API build output ===" &&
      ls -la apps/api/dist/ &&
      echo "=== Build verification complete ===" &&
      echo "=== Running database migrations ===" &&
      cd apps/api && pnpm exec drizzle-kit push --force &&
      echo "=== Database migrations complete ==="

    # Start the API server
    startCommand: cd apps/api && node dist/index.js

    healthCheckPath: /health

    # Environment Variables
    envVars:
      # Node environment
      - key: NODE_ENV
        value: production

      # API Configuration
      - key: API_PORT
        value: 3000
      - key: API_HOST
        value: 0.0.0.0
      - key: CORS_ORIGIN
        value: "*"  # Allow all origins (webapp will be on different domain)

      # iRacing Telemetry Configuration
      - key: IRACING_MODE
        value: remote
      - key: TELEMETRY_RATE
        value: 60

      # Feature Flags
      - key: ENABLE_VOICE_ALERTS
        value: false

      # Database (auto-created if using Blueprint)
      - key: DATABASE_URL
        fromDatabase:
          name: pitcrew-db
          property: connectionString

      # Redis (auto-created if using Blueprint)
      - key: REDIS_URL
        fromService:
          type: redis
          name: pitcrew-redis
          property: connectionString

      # Optional: Ollama AI service
      # - key: OLLAMA_BASE_URL
      #   value: http://your-ollama-instance:11434

  # Redis Cache Service
  - type: redis
    name: pitcrew-redis
    plan: free  # Change to 'starter' for production
    ipAllowList: []  # Allow all IPs

databases:
  # PostgreSQL Database
  - name: pitcrew-db
    databaseName: pitcrew_iracing
    plan: free  # Change to 'starter' for production
    ipAllowList: []  # Allow all IPs

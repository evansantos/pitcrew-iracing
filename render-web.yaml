# Render.com Webapp (Frontend) Deployment
# Deploys the Next.js webapp as a static site

services:
  # Static Site Service (Next.js Webapp)
  - type: static
    name: pitcrew-iracing-web
    buildCommand: |
      npm install -g pnpm &&
      pnpm install --no-frozen-lockfile --prod=false &&
      pnpm run build --filter=@iracing-race-engineer/web
    staticPublishPath: apps/web/out
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /_next/static/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    # Environment Variables for Next.js build
    envVars:
      # API Backend URL (change this to your API service URL)
      - key: NEXT_PUBLIC_API_URL
        value: https://pitcrew-iracing-api.onrender.com
      - key: NEXT_PUBLIC_WS_URL
        value: https://pitcrew-iracing-api.onrender.com
